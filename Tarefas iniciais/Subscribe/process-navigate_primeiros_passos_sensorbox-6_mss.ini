SET CENTRAL_PATH=../data/ufes/primeiros_passos
SET CORRECAO_PATH = home/lume/astro/bin

#SET MAP_PATH=atego1730_ufes_ype2/geodata/map_volta_da_ufes-20231127/map_files 
SET MAP_PATH=/home/lume/astro/data/ufes/primeiros_passos/geodata/map_primeiros_passos_20240613/map_files_mss
SET GRAPH_PATH=${CENTRAL_PATH}/geodata/map_primeiros_passos_20240613/graphs/graph_volta_da_ufes_20240521.gr
SET RDDF_PATH=${CENTRAL_PATH}/geodata/
SET ANNOTATION_PATH=${CENTRAL_PATH}/geodata/map_primeiros_passos_20240613/annotations/rddf_annotation_log_20140418.txt
#SET ANNOTATION_PATH=/home/lume/astro/data/ufes/primeiros_passos/geodata/map_primeiros_passos_20240613/annotations/rddf_annotation_log_20140418.txt
SET PARAM_DAEMON_PATH=${CENTRAL_PATH}/parameters_ini/astro-astro2p-ufes-sensorbox-6.ini


 param_daemon        support       1       0       ./param_daemon ${PARAM_DAEMON_PATH}
 proccontrol_gui     support       1       0       ./proccontrol_gui
 mss                 support        1       0       ./mss -level0 ${MAP_PATH}


 gps_xyz             filter        1       0       ./gps_xyz

#### Carro
 simulator 		support 	1		0			./simulator_ackerman 

#### SLAM
 localize            SLAM          1        0      ./localize_ackerman -mapping_mode off -lidar 0 -level 0
 mapper              SLAM          1        0      ./mapper -map_path ${MAP_PATH} -level 0
 od_mapper           SLAM          1        0      ./obstacle_distance_mapper

#### hierarquia de controle (top-down)
 route_planner       planner       1        0      ./route_planner --graph ${GRAPH_PATH} ${ANNOTATION_PATH}
 offroad_planner     planner       1        0      ./offroad_planner
 behavior_selector   planner       1        0      ./behavior_selector
 mpp                 planner       1        0      ./mpp
 obstacle_avoider    planner       1        0      ./obstacle_avoider
 rndf_build          planner       0        0      ./rddf_build ${RDDF_PATH}
 task_manager 		planner 	0		0			./task_manager -mission ${MISSION_PATH}

# task_manager 		planner 	1		0			./task_manager -start_delay off -mission_from_user_app on

#### interfaces
 navigator_gui       interface     1        0      ./navigator_gui2 -map_path ${MAP_PATH} -annotation_path ${ANNOTATION_PATH}
 viewer_3D           interface     1        0      ./viewer_3D
 Camera1             monitors      0        0      ./camera_viewer 1

 pub                pub             1       0       ./util_publish_initial_pose 7757875.582000	-363748.972000	-2.484600
